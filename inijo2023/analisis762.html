<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIJO - Analisis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        :root {
            --bg-main: #000000;
            --card-surface: #121214;
            --accent-yellow: #FACC15;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
        }
        .dashboard-card {
            background-color: var(--card-surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .mono-text {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-5xl w-full space-y-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
                    <span class="text-yellow-400">INIJO</span> Analisa Keuangan
                </h1>
                <p class="text-gray-500 font-bold text-[10px] uppercase tracking-widest mt-1">Grafik Omset & Kontrol Payroll Bulanan</p>
            </div>
            <div id="status-mode" class="flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 text-amber-400 px-3 py-1.5 rounded-full text-[11px] font-bold tracking-wide uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                Menghubungkan...
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
            <div class="dashboard-card p-4 rounded-2xl relative overflow-hidden group">
                <p class="text-[10px] font-extrabold text-gray-500 uppercase tracking-wider">Bruto</p>
                <h3 id="kpi-bruto" class="text-lg md:text-xl font-black text-yellow-400 mt-1 tracking-tight mono-text">-</h3>
                <p id="label-bulan-1" class="text-[9px] text-gray-500 font-medium mt-1">Memuat...</p>
                <div class="absolute right-3 bottom-3 text-white/5 group-hover:text-yellow-400/10 text-2xl transition-colors duration-300">
                    <i class="fa-solid fa-wallet"></i>
                </div>
            </div>

            <div class="dashboard-card p-4 rounded-2xl relative overflow-hidden group">
                <p class="text-[10px] font-extrabold text-gray-500 uppercase tracking-wider">Total Nota</p>
                <h3 id="kpi-nota" class="text-lg md:text-xl font-black text-white mt-1 tracking-tight mono-text">-</h3>
                <p id="label-bulan-2" class="text-[9px] text-gray-500 font-medium mt-1">Memuat...</p>
                <div class="absolute right-3 bottom-3 text-white/5 group-hover:text-white/10 text-2xl transition-colors duration-300">
                    <i class="fa-solid fa-receipt"></i>
                </div>
            </div>

            <div class="dashboard-card p-4 rounded-2xl relative overflow-hidden group">
                <p class="text-[10px] font-extrabold text-gray-500 uppercase tracking-wider">Diskon</p>
                <h3 id="kpi-diskon" class="text-lg md:text-xl font-black text-red-400 mt-1 tracking-tight mono-text">-</h3>
                <p id="label-bulan-3" class="text-[9px] text-gray-500 font-medium mt-1">Memuat...</p>
                <div class="absolute right-3 bottom-3 text-white/5 group-hover:text-red-400/10 text-2xl transition-colors duration-300">
                    <i class="fa-solid fa-tags"></i>
                </div>
            </div>

            <div class="dashboard-card p-4 rounded-2xl relative overflow-hidden group">
                <p class="text-[10px] font-extrabold text-gray-500 uppercase tracking-wider">Berat / Satuan</p>
                <h3 id="kpi-produksi" class="text-base md:text-lg font-black text-emerald-400 mt-1 tracking-tight mono-text">-</h3>
                <p id="label-bulan-4" class="text-[9px] text-gray-500 font-medium mt-1">Memuat...</p>
                <div class="absolute right-3 bottom-3 text-white/5 group-hover:text-emerald-400/10 text-2xl transition-colors duration-300">
                    <i class="fa-solid fa-weight-scale"></i>
                </div>
            </div>

            <div class="dashboard-card p-4 rounded-2xl relative overflow-hidden group col-span-2 md:col-span-1">
                <p class="text-[10px] font-extrabold text-gray-500 uppercase tracking-wider">Payroll Karyawan</p>
                <h3 id="kpi-payroll" class="text-lg md:text-xl font-black text-purple-400 mt-1 tracking-tight mono-text">-</h3>
                <p id="label-bulan-5" class="text-[9px] text-gray-500 font-medium mt-1">Memuat...</p>
                <div class="absolute right-3 bottom-3 text-white/5 group-hover:text-purple-400/10 text-2xl transition-colors duration-300">
                    <i class="fa-solid fa-users-gear"></i>
                </div>
            </div>
        </div>

        <div class="dashboard-card p-4 md:p-6 rounded-[24px]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-extrabold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-yellow-400"></i> Analisa Finansial vs Beban Gaji (Target Max 30%)
                </h2>
                <span class="text-[10px] text-gray-500 font-bold tracking-tight">Hover grafik untuk detail angka</span>
            </div>
            
            <div id="chart" class="w-full"></div>
        </div>
    </div>

    <script>
        // Array penampung data dinamis dari GitHub
        let omsetData = [];
        let chartInstance = null;

        const formatRupiah = (angka) => {
            return 'Rp ' + Math.round(angka).toLocaleString('id-ID');
        };

        // Fungsi Menampilkan Data Default Rata-Rata (Mengecualikan Bulan Berjalan)
        function setSummaryDefault() {
            if (omsetData.length === 0) return;
            
            // Ambil semua data kecuali baris terakhir (bulan berjalan) jika data lebih dari 1 baris
            const dataUntukRataRata = omsetData.length > 1 ? omsetData.slice(0, -1) : omsetData; 
            
            const totalBrutoBersih = dataUntukRataRata.reduce((sum, item) => sum + ((item.bruto || 0) - (item.diskon || 0)), 0);
            const totalNota = dataUntukRataRata.reduce((sum, item) => sum + (item.nota || 0), 0);
            const totalDiskon = dataUntukRataRata.reduce((sum, item) => sum + (item.diskon || 0), 0);
            const totalKg = dataUntukRataRata.reduce((sum, item) => sum + (item.kg || 0), 0);
            const totalSatuan = dataUntukRataRata.reduce((sum, item) => sum + (item.satuan || 0), 0);
            const totalPayroll = dataUntukRataRata.reduce((sum, item) => sum + (item.payroll || 0), 0);
            const totalBulan = dataUntukRataRata.length;

            // Render hasil pembagian rata-rata ke KPI Card
            document.getElementById('kpi-bruto').innerText = formatRupiah(totalBrutoBersih / totalBulan);
            document.getElementById('kpi-nota').innerText = Math.round(totalNota / totalBulan).toLocaleString('id-ID') + " /bln";
            document.getElementById('kpi-diskon').innerText = formatRupiah(totalDiskon / totalBulan);
            document.getElementById('kpi-produksi').innerText = `${Math.round(totalKg / totalBulan).toLocaleString('id-ID')} Kg / ${Math.round(totalSatuan / totalBulan)} Pcs`;
            document.getElementById('kpi-payroll').innerText = formatRupiah(totalPayroll / totalBulan);
            
            for(let i=1; i<=5; i++) {
                document.getElementById(`label-bulan-${i}`).innerText = "Rerata Bulan Penuh (Excl. Bulan Berjalan)";
            }
        }

        function updateKpiCards(index) {
            const selected = omsetData[index];
            if (!selected) return;
            
            document.getElementById('kpi-bruto').innerText = formatRupiah((selected.bruto || 0) - (selected.diskon || 0));
            document.getElementById('kpi-nota').innerText = (selected.nota || 0).toLocaleString('id-ID') + " Transaksi";
            document.getElementById('kpi-diskon').innerText = formatRupiah(selected.diskon || 0);
            document.getElementById('kpi-produksi').innerText = `${(selected.kg || 0).toLocaleString('id-ID')} Kg / ${selected.satuan || 0} Pcs`;
            document.getElementById('kpi-payroll').innerText = formatRupiah(selected.payroll || 0);
            
            for(let i=1; i<=5; i++) {
                document.getElementById(`label-bulan-${i}`).innerText = `Data Bulan: ${selected.bulan || '-'}`;
            }
        }

        // Fungsi Utama untuk Mengambil Data Real-Time
        async function muatDataFinansialAsli() {
            try {
                const response = await fetch('/api/analisis');
                const result = await response.json();
                
                if (result.success && Array.isArray(result.data)) {
                    omsetData = result.data;
                    
                    // Ganti indikator header menjadi Live Mode
                    const statusEl = document.getElementById('status-mode');
                    statusEl.className = "flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded-full text-[11px] font-bold tracking-wide uppercase";
                    statusEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Database Live`;
                    
                    // Olah dan petakan data untuk kebutuhan grafik ApexCharts
                    inialisasiGrafikDinamis();
                    setSummaryDefault();
                } else {
                    gagalMemuatData("Format Data Error");
                }
            } catch (err) {
                gagalMemuatData("Koneksi API Gagal");
            }
        }

        function gagalMemuatData(pesan) {
            const statusEl = document.getElementById('status-mode');
            statusEl.className = "flex items-center gap-2 bg-rose-500/10 border border-rose-500/20 text-rose-400 px-3 py-1.5 rounded-full text-[11px] font-bold tracking-wide uppercase";
            statusEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-rose-400"></span> ${pesan}`;
            
            for(let i=1; i<=5; i++) {
                document.getElementById(`label-bulan-${i}`).innerText = "Gagal memuat data";
            }
        }

        function inialisasiGrafikDinamis() {
            const kategoriBulan = omsetData.map(item => item.bulan || '-');
            const seriBruto = omsetData.map(item => (item.bruto || 0) - (item.diskon || 0));
            const seriPayroll = omsetData.map(item => item.payroll || 0);
            const seriTargetPayroll = omsetData.map(item => (item.bruto || 0) * 0.3);
        
            const options = {
                chart: {
                    type: 'area',
                    height: 350,
                    toolbar: { show: false },
                    background: 'transparent',
                    foreColor: '#71717a',
                    // --- TAMBAHKAN BLOK INI UNTUK MATIKAN ZOOM ---
                    zoom: {
                        enabled: false
                    },
                    // ---------------------------------------------
                    events: {
                        dataPointMouseEnter: function(event, chartContext, config) {
                            if (config.dataPointIndex > -1) {
                                updateKpiCards(config.dataPointIndex);
                            }
                        },
                        mouseLeave: function() {
                            setSummaryDefault();
                        }
                    }
                },
                series: [
                    { name: 'Bruto (Pendapatan)', type: 'area', data: seriBruto },
                    { name: 'Payroll Aktual', type: 'line', data: seriPayroll },
                    { name: 'Target Max Payroll (30%)', type: 'line', data: seriTargetPayroll }
                ],
                annotations: {
                    yaxis: [{
                        y: 80000000,
                        borderColor: '#EF4444',
                        strokeDashArray: 5,
                        borderWidth: 2,
                        label: {
                            borderColor: '#EF4444',
                            style: { color: '#FFF', background: '#EF4444', fontWeight: '700', fontSize: '10px' },
                            text: '80JT'
                        }
                    }]
                },
                xaxis: {
                    categories: kategoriBulan,
                    axisBorder: { show: false },
                    axisTicks: { show: false },
                },
                yaxis: {
                    labels: {
                        formatter: function (value) {
                            return (value / 1000000) + " Jt";
                        }
                    }
                },
                stroke: {
                    curve: 'smooth',
                    width: [3, 3, 2],
                    dashArray: [0, 0, 5]
                },
                fill: {
                    type: ['gradient', 'solid', 'solid'],
                    gradient: {
                        shadeIntensity: 1,
                        opacityFrom: 0.35,
                        opacityTo: 0.01,
                        stops: [0, 100],
                        colorStops: [
                            { offset: 0, color: '#FACC15', opacity: 0.35 },
                            { offset: 100, color: '#FACC15', opacity: 0.01 }
                        ]
                    }
                },
                dataLabels: { enabled: false },
                grid: {
                    borderColor: 'rgba(255, 255, 255, 0.05)',
                    strokeDashArray: 4,
                    padding: { right: 20, left: 10 }
                },
                theme: { mode: 'dark' },
                colors: ['#FACC15', '#A78BFA', '#E4E4E7'],
                tooltip: {
                    theme: 'dark',
                    shared: true,
                    intersect: false,
                    custom: function({ series, seriesIndex, dataPointIndex, w }) {
                        const data = omsetData[dataPointIndex];
                        if (!data) return '';
                        
                        const hitungBruto = (data.bruto || 0) - (data.diskon || 0);
                        const persenPayroll = data.bruto > 0 ? Math.round((data.payroll / data.bruto) * 100) : 0;
                        
                        let statusBudget = `<span class="text-emerald-400 font-extrabold ml-1">(AMAN)</span>`;
                        let borderStatusColor = "border-emerald-500/30";
                        if(persenPayroll > 30) {
                            statusBudget = `<span class="text-red-500 font-extrabold ml-1 animate-pulse">(LEBIH)</span>`;
                            borderStatusColor = "border-red-500/40";
                        }
        
                        return `
                            <div class="bg-[#121214] border ${borderStatusColor} rounded-xl p-3 shadow-2xl min-w-[220px] text-xs">
                                <div class="text-gray-400 font-extrabold border-b border-white/10 pb-1.5 mb-2 uppercase tracking-wide text-[10px] flex justify-between items-center">
                                    <span>${data.bulan || '-'}</span>
                                    ${persenPayroll > 0 ? `<span>Rasio: ${persenPayroll}%</span>` : ''}
                                </div>
                                <div class="space-y-1.5 text-white">
                                    <div class="flex justify-between gap-4">
                                        <span class="text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-money-bill-wave text-orange-400 w-3"></i> Omset:</span>
                                        <span class="font-bold text-orange-400 font-mono">${formatRupiah(data.bruto || 0)}</span>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                        <span class="text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-tags text-red-400 w-3"></i> Diskon:</span>
                                        <span class="font-bold text-red-400 font-mono">${formatRupiah(data.diskon || 0)}</span>
                                    </div>
                                    <div class="flex justify-between gap-4">
                                        <span class="text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-wallet text-yellow-400 w-3"></i> Bruto:</span>
                                        <span class="font-bold text-yellow-400 font-mono">${formatRupiah(hitungBruto)}</span>
                                    </div>
                                    <div class="border-t border-white/5 my-1"></div>
                                    <div class="flex justify-between gap-4">
                                        <span class="text-gray-400 flex items-center gap-1.5"><i class="fa-solid fa-users-gear text-purple-400 w-3"></i> Payroll:</span>
                                        <span class="font-bold text-purple-400 font-mono">${formatRupiah(data.payroll || 0)}</span>
                                    </div>
                                    <div class="flex justify-between gap-4 text-[10px] bg-white/5 p-1 rounded-md mt-1">
                                        <span class="text-gray-400">Status Beban:</span>
                                        <span class="font-mono">${persenPayroll}% dari Omset ${statusBudget}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            };
        
            chartInstance = new ApexCharts(document.querySelector("#chart"), options);
            chartInstance.render();
        }

        // Eksekusi penarikan data begitu halaman siap diakses
        window.onload = () => {
            muatDataFinansialAsli();
        };
    </script>
</body>
</html>
