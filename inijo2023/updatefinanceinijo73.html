<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor Finansial INIJO Laundry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 mb-6 border-b border-slate-700 gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-teal-500 text-slate-900 p-2 rounded-lg text-xl font-bold">
                    <i class="fa-solid fa-table-list"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">INIJO LAUNDRY</h1>
                    <p class="text-xs text-slate-400">Database JSON Editor Finansial</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <input type="password" id="pin" maxlength="6" placeholder="Masukkan PIN Vercel" 
                    class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-center text-sm font-mono focus:outline-none focus:border-teal-500 w-40">
                
                <button onclick="tambahBaris Baru()" class="bg-slate-700 hover:bg-slate-600 text-teal-400 text-sm font-semibold py-2 px-4 rounded-xl transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-plus"></i> <span>Tambah Bulan</span>
                </button>

                <button id="btnSimpan" onclick="simpanPerubahanMassal()" class="bg-teal-500 hover:bg-teal-600 text-slate-900 text-sm font-bold py-2 px-5 rounded-xl shadow-lg transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-floppy-disk"></i> <span>Simpan Semua</span>
                </button>
            </div>
        </div>

        <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

        <div class="overflow-x-auto rounded-xl border border-slate-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/50 text-slate-400 text-xs uppercase tracking-wider border-b border-slate-700">
                        <th class="p-3 text-center w-12">No</th>
                        <th class="p-3 w-32">Bulan</th>
                        <th class="p-3">Omset Bruto</th>
                        <th class="p-3">Total Diskon</th>
                        <th class="p-3">Total Nota</th>
                        <th class="p-3">Total Kg</th>
                        <th class="p-3">Satuan</th>
                        <th class="p-3">Total Payroll</th>
                        <th class="p-3 text-center w-16">Aksi</th>
                    </tr>
                </thead>
                <tbody id="jsonTableBody" class="divide-y divide-slate-700 text-sm">
                    <tr>
                        <td colspan="9" class="p-8 text-center text-slate-500"><i class="fa-solid fa-spinner animate-spin mr-2"></i> Sedang mengambil data dari GitHub...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let localDataList = [];

        // Ambil data pertama kali saat halaman di-load
        async function muatDataDariGitHub() {
            try {
                const response = await fetch('/api/analisis');
                const result = await response.json();
                if (result.success && Array.isArray(result.data)) {
                    localDataList = result.data;
                    renderTabel();
                } else {
                    tampilkanPesan('Gagal mengambil data dari repositori GitHub.', 'error');
                }
            } catch (err) {
                tampilkanPesan('Gagal terhubung ke API Vercel.', 'error');
            }
        }

        // Render susunan list array ke baris elemen tabel HTML
        function renderTabel() {
            const tbody = document.getElementById('jsonTableBody');
            if (localDataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-slate-500">Tidak ada data. Silakan klik Tambah Bulan.</td></tr>`;
                return;
            }

            tbody.innerHTML = localDataList.map((item, index) => `
                <tr class="hover:bg-slate-750/40 transition-colors">
                    <td class="p-2 text-center text-slate-500 font-mono text-xs">${index + 1}</td>
                    <td class="p-2"><input type="text" value="${item.bulan || ''}" onchange="updateCell(${index}, 'bulan', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none"></td>
                    <td class="p-2"><input type="number" value="${item.bruto || 0}" onchange="updateCell(${index}, 'bruto', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2"><input type="number" step="0.01" value="${item.diskon || 0}" onchange="updateCell(${index}, 'diskon', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2"><input type="number" value="${item.nota || 0}" onchange="updateCell(${index}, 'nota', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2"><input type="number" step="0.1" value="${item.kg || 0}" onchange="updateCell(${index}, 'kg', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2"><input type="number" value="${item.satuan || 0}" onchange="updateCell(${index}, 'satuan', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2"><input type="number" value="${item.payroll || 0}" onchange="updateCell(${index}, 'payroll', this.value)" class="w-full bg-slate-900/60 border border-slate-700 rounded px-2 py-1 focus:border-teal-500/50 outline-none font-mono"></td>
                    <td class="p-2 text-center">
                        <button onclick="hapusBaris(${index})" class="text-rose-400 hover:text-rose-500 p-1 transition-colors" title="Hapus Bulan ini">
                            <i class="fa-regular fa-trash-can text-base"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Simpan inputan sel tabel langsung ke memori lokal variable JavaScript
        function updateCell(index, key, value) {
            localDataList[index][key] = (key === 'bulan') ? value : Number(value);
        }

        // Tambah baris kosong baru di bagian paling bawah tabel
        function tambahBarisBaru() {
            localDataList.push({ bulan: '', bruto: 0, diskon: 0, nota: 0, kg: 0, satuan: 0, payroll: 0 });
            renderTabel();
            // Otomatis scroll fokus ke baris paling baru
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Hapus salah satu baris dari memori lokal sebelum disimpan permanen
        function hapusBaris(index) {
            if(confirm(`Hapus baris data nomor ${index + 1}?`)) {
                localDataList.splice(index, 1);
                renderTabel();
            }
        }

        // Kirim seluruh data yang sudah diubah ke API Vercel -> Commit ke GitHub
        async function simpanPerubahanMassal() {
            const pinCode = document.getElementById('pin').value;
            const btnSimpan = document.getElementById('btnSimpan');

            if (!pinCode) {
                alert('Kamu wajib memasukkan PIN otorisasi Vercel terlebih dahulu!');
                return;
            }

            // Animasi Loading saat proses commit berjalan
            btnSimpan.disabled = true;
            btnSimpan.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>Menyimpan...</span>`;
            
            try {
                const response = await fetch('/api/analisis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pin: pinCode,
                        dataSemua: localDataList
                    })
                });

                const result = await response.json();

                if (response.status === 200 && result.success) {
                    tampilkanPesan(result.message, 'success');
                } else {
                    tampilkanPesan(`Gagal Menyimpan: ${result.message}`, 'error');
                }
            } catch (err) {
                tampilkanPesan('Terjadi kesalahan jaringan sistem backend.', 'error');
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> <span>Simpan Semua</span>`;
            }
        }

        function tampilkanPesan(text, tipe) {
            const el = document.getElementById('statusMessage');
            el.innerText = text;
            el.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium border";
            if (tipe === 'success') {
                el.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/30');
            } else {
                el.classList.add('bg-rose-500/10', 'text-rose-400', 'border-rose-500/30');
            }
            el.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Jalankan pengambilan data otomatis saat user membuka dashboard
        muatDataDariGitHub();
    </script>
</body>
</html>
