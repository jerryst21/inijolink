<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Data Performa Outlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans+Mono:wght@200..900&display=swap" rel="stylesheet">
    <style>
        /* Style untuk memberikan feedback visual saat baris sedang di-drag */
        .drag-over {
            border-top: 2px solid #facc15 !important;
            background-color: rgba(250, 204, 21, 0.05);
        }
        .dragging {
            opacity: 0.5;
            background-color: rgba(250, 204, 21, 0.1);
        }
        /* Menerapkan font Reddit Sans Mono khusus untuk tabel */
        .tabel-custom-font {
            font-family: 'Reddit Sans Mono', monospace !important;
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-neutral-900 p-6 rounded-2xl shadow-xl border border-neutral-800">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 mb-6 border-b border-neutral-800 gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-yellow-400 text-neutral-950 p-2 rounded-lg text-xl font-bold">
                    <i class="fa-solid fa-table-list"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-yellow-400">INIJO LAUNDRY</h1>
                    <p class="text-xs text-neutral-400">Performa Outlet Data Editor</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <input type="password" id="pin" maxlength="6" placeholder="Masukkan PIN" 
                    class="bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-center text-sm font-mono focus:outline-none focus:border-yellow-400 w-40">
                
                <button onclick="tambahBarisBaru()" class="bg-neutral-800 hover:bg-neutral-700 text-yellow-400 text-sm font-semibold py-2 px-4 rounded-xl transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-plus"></i> <span>Tambah Bulan</span>
                </button>

                <button id="btnSimpan" onclick="simpanPerubahanMassal()" class="bg-yellow-400 hover:bg-yellow-500 text-neutral-950 text-sm font-bold py-2 px-5 rounded-xl shadow-lg transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-floppy-disk"></i> <span>Simpan Semua</span>
                </button>
            </div>
        </div>

        <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

        <div class="overflow-x-auto rounded-xl border border-neutral-800">
            <table class="w-full text-left border-collapse tabel-custom-font">
                <thead>
                    <tr class="bg-neutral-950 text-neutral-400 text-xs uppercase tracking-wider border-b border-neutral-800">
                        <th class="p-3 text-center w-10">Urut</th>
                        <th class="p-3 text-center w-12">No</th>
                        <th class="p-3 w-28">Bulan</th>
                        <th class="p-3 w-[140px]">Omset Bruto</th>
                        <th class="p-3 w-[120px]">Total Diskon</th>
                        <th class="p-3 w-[100px]">Total Nota</th>
                        <th class="p-3 w-[100px]">Total Kg</th>
                        <th class="p-3 w-[100px]">Satuan</th>
                        <th class="p-3 w-[140px]">Total Payroll</th>
                        <th class="p-3 text-center w-16">Aksi</th>
                    </tr>
                </thead>
                <tbody id="jsonTableBody" class="divide-y divide-neutral-800 text-sm">
                    <tr>
                        <td colspan="10" class="p-8 text-center text-neutral-500"><i class="fa-solid fa-spinner animate-spin mr-2"></i> Sedang mengambil data dari GitHub...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let localDataList = [];
        let dragSrcEl = null;

        // Fungsi format ribuan (Format Indonesia dengan titik)
        function formatRibuan(angka, isDecimal = false) {
            if (angka === undefined || angka === null || isNaN(angka)) return '0';
            let stringAngka = angka.toString().replace(/[^0-9.-]/g, '');
            let parts = stringAngka.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return isDecimal && parts[1] ? parts.join(',') : parts[0];
        }

        // Fungsi membersihkan format ribuan menjadi angka murni kembali
        function bersihkanAngka(string) {
            if (!string) return 0;
            // Ubah titik ribuan menjadi hilang, dan koma desimal menjadi titik desimal
            let bersih = string.replace(/\./g, '').replace(/,/g, '.');
            return Number(bersih) || 0;
        }

        // Handle perubahan input saat user mengetik untuk otomatis pasang separator
        function handleInputFormat(input, index, key, isDecimal = false) {
            let nilaiBersih = bersihkanAngka(input.value);
            input.value = formatRibuan(nilaiBersih, isDecimal);
            localDataList[index][key] = nilaiBersih;
        }

        // Ambil data pertama kali saat halaman di-load
        async function muatDataDariGitHub() {
            try {
                const response = await fetch('/api/analisis');
                const result = await response.json();
                if (result.success && Array.isArray(result.data)) {
                    localDataList = result.data;
                    renderTabel();
                } else {
                    tampilkanPesan('Gagal mengambil data dari repositori.', 'error');
                }
            } catch (err) {
                tampilkanPesan('Gagal terhubung ke API.', 'error');
            }
        }

        // Render susunan list array ke baris elemen tabel HTML
        function renderTabel() {
            const tbody = document.getElementById('jsonTableBody');
            if (localDataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-8 text-center text-neutral-500">Tidak ada data. Silakan klik Tambah Bulan.</td></tr>`;
                return;
            }

            tbody.innerHTML = localDataList.map((item, index) => `
                <tr class="hover:bg-neutral-800/50 transition-colors" 
                    draggable="true" 
                    data-index="${index}"
                    ondragstart="handleDragStart(event)" 
                    ondragover="handleDragOver(event)" 
                    ondragenter="handleDragEnter(event)" 
                    ondragleave="handleDragLeave(event)" 
                    ondrop="handleDrop(event)" 
                    ondragend="handleDragEnd(event)">
                    
                    <td class="p-2 text-center cursor-grab active:cursor-grabbing text-neutral-500 hover:text-yellow-400">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </td>
                    
                    <td class="p-2 text-center text-neutral-500 text-xs nomor-urut">${index + 1}</td>
                    <td class="p-2"><input type="text" value="${item.bulan || ''}" onchange="localDataList[${index}].bulan = this.value" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.bruto)}" oninput="handleInputFormat(this, ${index}, 'bruto')" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.diskon, true)}" oninput="handleInputFormat(this, ${index}, 'diskon', true)" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.nota)}" oninput="handleInputFormat(this, ${index}, 'nota')" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.kg, true)}" oninput="handleInputFormat(this, ${index}, 'kg', true)" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.satuan)}" oninput="handleInputFormat(this, ${index}, 'satuan')" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2"><input type="text" value="${formatRibuan(item.payroll)}" oninput="handleInputFormat(this, ${index}, 'payroll')" class="w-full bg-neutral-950 border border-neutral-800 rounded px-2 py-1 focus:border-yellow-400/50 outline-none text-right"></td>
                    <td class="p-2 text-center">
                        <button onclick="hapusBaris(${index})" class="text-rose-400 hover:text-rose-500 p-1 transition-colors" title="Hapus Bulan ini">
                            <i class="fa-regular fa-trash-can text-base"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ================= DRAG AND DROP HANDLER SYSTEM =================
        function handleDragStart(e) {
            dragSrcEl = e.currentTarget;
            dragSrcEl.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcEl.getAttribute('data-index'));
        }

        // ... Sisa script drag and drop serta simpan data tetap sama tanpa perubahan ...
        function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); return false; }
        function handleDragEnter(e) { let row = e.currentTarget; if (row !== dragSrcEl) row.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            let targetRow = e.currentTarget;
            let fromIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
            let toIndex = parseInt(targetRow.getAttribute('data-index'), 10);
            if (fromIndex !== toIndex) {
                const targetData = localDataList.splice(fromIndex, 1)[0];
                localDataList.splice(toIndex, 0, targetData);
                renderTabel();
            }
            return false;
        }
        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('#jsonTableBody tr').forEach(row => row.classList.remove('drag-over'));
        }
        function tambahBarisBaru() {
            localDataList.push({ bulan: '', bruto: 0, diskon: 0, nota: 0, kg: 0, satuan: 0, payroll: 0 });
            renderTabel();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function hapusBaris(index) {
            if(confirm(`Hapus baris data nomor ${index + 1}?`)) {
                localDataList.splice(index, 1);
                renderTabel();
            }
        }
        async function simpanPerubahanMassal() {
            const pinCode = document.getElementById('pin').value;
            const btnSimpan = document.getElementById('btnSimpan');
            if (!pinCode) { alert('Kamu wajib memasukkan PIN otorisasi terlebih dahulu!'); return; }
            btnSimpan.disabled = true;
            btnSimpan.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>Menyimpan...</span>`;
            try {
                const response = await fetch('/api/analisis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: pinCode, dataSemua: localDataList })
                });
                const result = await response.json();
                if (response.status === 200 && result.success) {
                    tampilkanPesan(result.message, 'success');
                } else {
                    tampilkanPesan(`Gagal Menyimpan: ${result.message}`, 'error');
                }
            } catch (err) {
                tampilkanPesan('Terjadi kesalahan jaringan sistem backend.', 'error');
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> <span>Simpan Semua</span>`;
            }
        }
        function tampilkanPesan(text, tipe) {
            const el = document.getElementById('statusMessage');
            el.innerText = text;
            el.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium border";
            if (tipe === 'success') { el.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/30'); } 
            else { el.classList.add('bg-rose-500/10', 'text-rose-400', 'border-rose-500/30'); }
            el.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        muatDataDariGitHub();
    </script>
</body>
</html>
