<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cloud Clipboard Personal</title>
  <link rel="icon" href="uploads/2026-06-05-clipboard-icon.png" type="image/png">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans antialiased pb-12">

  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200 shadow-sm transition-all">
    <div class="max-w-2xl mx-auto px-4 h-16 flex justify-between items-center">
      <h1 class="text-xl font-bold text-indigo-600 tracking-tight flex items-center gap-1.5">
        <span>☁️</span> <span class="text-gray-900 font-extrabold">Cloud</span>Clipboard
      </h1>
      <div class="flex items-center gap-1.5">
        <button id="btn-refresh" class="bg-gray-100 hover:bg-gray-200 active:scale-95 px-3 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-1">
          🔄 <span class="hidden sm:inline">Refresh</span>
        </button>
        <button id="btn-clear-all" class="bg-red-50 hover:bg-red-100 active:scale-95 text-red-600 px-3 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-1">
          🗑️ <span class="hidden sm:inline">Clear Unpinned</span>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 mt-5">
    <main class="space-y-5">
      
      <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
        <textarea id="input-text" rows="4" class="w-full p-3 text-base border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none overflow-hidden placeholder-gray-400 bg-gray-55/50 focus:bg-white transition text-[16px]" placeholder="Tempel atau ketik teks clipboard di sini..."></textarea>
        <div class="mt-3 flex justify-end">
          <button id="btn-save" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white px-6 py-3 rounded-xl font-bold transition shadow-sm shadow-indigo-200">
            Simpan ke Cloud
          </button>
        </div>
      </section>

      <div id="loading-status" class="text-center text-sm font-medium text-indigo-600 animate-pulse hidden">
        ⏳ Memproses data...
      </div>

      <section>
        <h2 class="text-base font-bold text-gray-500 uppercase tracking-wider mb-3 px-1">History Clipboard</h2>
        <div id="clipboard-list" class="space-y-3.5">
          <div class="text-center py-12 bg-white rounded-2xl border border-gray-200 text-gray-400 text-sm">Belum ada history.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2">
    <span>✅</span> Berhasil disalin!
  </div>

  <script>
    // State aplikasi lokal
    let clipboardItems = [];

    // DOM Elements
    const inputText = document.getElementById('input-text');
    const btnSave = document.getElementById('btn-save');
    const btnRefresh = document.getElementById('btn-refresh');
    const btnClearAll = document.getElementById('btn-clear-all');
    const clipboardList = document.getElementById('clipboard-list');
    const loadingStatus = document.getElementById('loading-status');
    const toast = document.getElementById('toast');

    // BARU: Fungsi untuk mengatur tinggi textarea otomatis mengikuti jumlah teks
    function autoResizeTextArea() {
      inputText.style.height = 'auto'; // Reset tinggi ke bawaan agar hitungan baris mengecil akurat
      inputText.style.height = inputText.scrollHeight + 'px'; // Set sesuai tinggi isi teks asli
    }

    // Pasang fungsi resize otomatis saat user mengetik atau menempelkan teks
    inputText.addEventListener('input', autoResizeTextArea);

    // Menampilkan/menyembunyikan loading status
    function toggleLoading(show) {
      if (show) loadingStatus.classList.remove('hidden');
      else loadingStatus.classList.add('hidden');
    }

    // Mengambil data dari Vercel Function (GET)
    async function fetchClipboard() {
      toggleLoading(true);
      try {
        const res = await fetch('/api/clipboard');
        if (res.ok) {
          // Fase 1: Memastikan data yang diterima langsung disimpan ke state lokal
          clipboardItems = await res.json();
          renderList();
        } else {
          showNotification('❌ Gagal memuat data dari cloud.');
        }
      } catch (err) {
        console.error("Fetch error:", err);
        showNotification('❌ Terjadi kesalahan jaringan.');
      } finally {
        toggleLoading(false);
      }
    }

    // Mengirim data ke Vercel Function (POST)
    async function saveClipboard(updatedItems) {
      toggleLoading(true);
      try {
        const res = await fetch('/api/clipboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: updatedItems })
        });
        if (res.ok) {
          const data = await res.json();
          clipboardItems = data.items;
          renderList();
        } else {
          showNotification('❌ Gagal menyimpan data.');
        }
      } catch (err) {
        console.error(err);
      } finally {
        toggleLoading(false);
      }
    }

    // Merender item ke layar
    function renderList() {
      clipboardList.innerHTML = '';
      
      if (clipboardItems.length === 0) {
        clipboardList.innerHTML = '<div class="text-center py-12 bg-white rounded-2xl border border-gray-200 text-gray-400 text-sm">Belum ada history.</div>';
        return;
      }

      // Murni disortir berdasarkan tanggal terbaru
      const sortedItems = [...clipboardItems].sort((a, b) => {
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      sortedItems.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = `p-4 rounded-2xl shadow-sm border transition-all flex flex-col justify-between ${
          item.pinned ? 'bg-amber-50/60 border-amber-300 ring-1 ring-amber-300' : 'bg-white border-gray-200'
        }`;

        // Format tanggal lokal
        const dateFormatted = new Date(item.createdAt).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

        itemEl.innerHTML = `
          <div class="whitespace-pre-wrap break-words text-[15px] leading-relaxed text-gray-800 pb-3 select-text">${escapeHTML(item.text)}</div>
          
          <div class="border-t pt-3 border-gray-100 flex flex-col gap-2.5">
            <div class="text-[11px] font-semibold text-gray-400 flex items-center gap-1 px-0.5">
              <span>📅</span> <span>${dateFormatted}</span>
            </div>
            
            <div class="grid grid-cols-3 gap-2 text-xs font-bold text-center">
              <button onclick="copyText('${escapeJS(item.text)}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1">
                📋 Copy
              </button>
              <button onclick="togglePin('${item.id}')" class="py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1 ${
                item.pinned ? 'bg-amber-200 text-amber-900 hover:bg-amber-300' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'
              }">
                📌 ${item.pinned ? 'Unpin' : 'Pin'}
              </button>
              <button onclick="deleteItem('${item.id}')" class="bg-red-50 hover:bg-red-100 text-red-700 py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1">
                ❌ Hapus
              </button>
            </div>
          </div>
        `;
        clipboardList.appendChild(itemEl);
      });
    }

    // Aksi: Simpan Item Baru
    btnSave.addEventListener('click', () => {
      const text = inputText.value.trim();
      if (!text) return;

      const newItem = {
        id: 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
        text: text,
        createdAt: new Date().toISOString(),
        pinned: false
      };

      const updated = [newItem, ...clipboardItems];
      saveClipboard(updated);
      
      inputText.value = ''; // Kosongkan input otomatis
      autoResizeTextArea(); // UPDATE: Kembalikan ukuran textarea ke semula setelah kosong
      inputText.blur(); // Tutup keyboard mobile setelah simpan
    });

    // Aksi: Toggle Pin/Unpin
    function togglePin(id) {
      const updated = clipboardItems.map(item => {
        if (item.id === id) item.pinned = !item.pinned;
        return item;
      });
      saveClipboard(updated);
    }

    // Aksi: Hapus per Item
    function deleteItem(id) {
      if (confirm('Hapus item ini?')) {
        const updated = clipboardItems.filter(item => item.id !== id);
        saveClipboard(updated);
      }
    }

    // Aksi: Bersihkan semua yang tidak di-pin
    btnClearAll.addEventListener('click', () => {
      if (confirm('Hapus semua item yang tidak di-pin?')) {
        const updated = clipboardItems.filter(item => item.pinned === true);
        saveClipboard(updated);
      }
    }
  );

    // Aksi: Refresh Manual
    btnRefresh.addEventListener('click', fetchClipboard);

    // Fungsi Pembantu: Salin teks ke clipboard browser asli
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showNotification('✅ Teks disalin!');
      }).catch(err => alert('Gagal menyalin teks: ' + err));
    }

    // Notifikasi Toast Ringan khas Aplikasi Mobile
    function showNotification(message) {
      toast.innerHTML = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // Utilities untuk keamanan XSS sederhana
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
    function escapeJS(str) {
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
    }

    // Load data pertama kali saat halaman dibuka
    window.addEventListener('DOMContentLoaded', fetchClipboard);
  </script>
</body>
</html>
