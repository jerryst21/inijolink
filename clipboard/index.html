<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cloud Clipboard Personal</title>
  <link rel="icon" href="uploads/2026-06-05-clipboard-icon.png" type="image/png">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans antialiased pb-12">

  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200 shadow-sm transition-all">
    <div class="max-w-2xl mx-auto px-4 h-16 flex justify-between items-center">
      <h1 class="text-xl font-bold text-indigo-600 tracking-tight flex items-center gap-1.5">
        <span>☁️</span> <span class="text-gray-900 font-extrabold">Cloud</span>Clipboard
      </h1>
      <div class="flex items-center gap-1.5">
        <button id="btn-refresh" class="bg-gray-100 hover:bg-gray-200 active:scale-95 px-3 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-1">
          🔄 <span class="hidden sm:inline">Refresh</span>
        </button>
        <button id="btn-clear-all" class="bg-red-50 hover:bg-red-100 active:scale-95 text-red-600 px-3 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-1">
          🗑️ <span class="hidden sm:inline">Clear Unpinned</span>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 mt-5">
    <main class="space-y-5">
      
      <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
        <label for="input-text" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Input Clipboard Baru</label>
        <textarea id="input-text" rows="4" class="w-full p-3 text-base border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none overflow-hidden placeholder-gray-400 bg-gray-50 focus:bg-white transition text-[16px]" placeholder="Tempel atau ketik teks clipboard di sini..."></textarea>
        <div class="mt-3 flex justify-end">
          <button id="btn-save" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white px-6 py-3 rounded-xl font-bold transition shadow-sm shadow-indigo-200">
            Simpan ke Cloud
          </button>
        </div>
      </section>

      <div id="loading-status" class="text-center text-sm font-medium text-indigo-600 animate-pulse hidden">
        ⏳ Memproses data...
      </div>

      <section class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200">
        <div class="grid grid-cols-3 gap-2">
          <div class="col-span-2">
            <label for="input-search" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Cari Teks (Bisa > 1 kata)</label>
            <div class="relative">
              <input type="text" id="input-search" class="w-full p-2.5 pl-8 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 focus:bg-white transition" placeholder="Cari teks...">
              <span class="absolute left-2.5 top-3 text-xs">🔍</span>
            </div>
          </div>
          
          <div class="col-span-1">
            <label for="filter-pin" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Status Pin</label>
            <select id="filter-pin" class="w-full p-2.5 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 focus:bg-white transition font-medium">
              <option value="all">🌐 Semua</option>
              <option value="pinned">📌 Di-pin</option>
              <option value="unpinned">🔓 Tidak di-pin</option>
            </select>
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-base font-bold text-gray-500 uppercase tracking-wider mb-3 px-1">History Clipboard</h2>
        <div id="clipboard-list" class="space-y-3.5">
          <div class="text-center py-12 bg-white rounded-2xl border border-gray-200 text-gray-400 text-sm">Belum ada history.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2">
    <span>✅</span> Berhasil disalin!
  </div>

  <script>
    // State aplikasi lokal
    let clipboardItems = [];

    // DOM Elements
    const inputText = document.getElementById('input-text');
    const btnSave = document.getElementById('btn-save');
    const btnRefresh = document.getElementById('btn-refresh');
    const btnClearAll = document.getElementById('btn-clear-all');
    const clipboardList = document.getElementById('clipboard-list');
    const loadingStatus = document.getElementById('loading-status');
    const toast = document.getElementById('toast');

    // Fungsi untuk mengatur tinggi textarea otomatis mengikuti jumlah teks
    function autoResizeTextArea() {
      inputText.style.height = 'auto';
      inputText.style.height = inputText.scrollHeight + 'px';
    }

    // Pasang fungsi resize otomatis saat user mengetik atau menempelkan teks
    inputText.addEventListener('input', autoResizeTextArea);

    // Menampilkan/menyembunyikan loading status
    function toggleLoading(show) {
      if (show) loadingStatus.classList.remove('hidden');
      else loadingStatus.classList.add('hidden');
    }

    // Mengambil data dari Vercel Function (GET)
    async function fetchClipboard() {
      toggleLoading(true);
      try {
        const res = await fetch('/api/clipboard');
        if (res.ok) {
          clipboardItems = await res.json();
          renderList();
        } else {
          showNotification('❌ Gagal memuat data dari cloud.');
        }
      } catch (err) {
        console.error("Fetch error:", err);
        showNotification('❌ Terjadi kesalahan jaringan.');
      } finally {
        toggleLoading(false);
      }
    }

    // Mengirim data baru ke Vercel Function (POST)
    async function saveClipboard(textValue) {
      toggleLoading(true);
      try {
        const res = await fetch('/api/clipboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: textValue })
        });
        if (res.ok) {
          const data = await res.json();
          // Masukkan item baru ke posisi paling atas array lokal
          clipboardItems = [data.item, ...clipboardItems];
          renderList();
          showNotification('✅ Berhasil disimpan ke cloud!');
        } else {
          showNotification('❌ Gagal menyimpan data.');
        }
      } catch (err) {
        console.error(err);
        showNotification('❌ Terjadi kesalahan jaringan.');
      } finally {
        toggleLoading(false);
      }
    }

    // Merender item ke layar
    function renderList() {
      clipboardList.innerHTML = '';
      
      // 1. Filter Pencarian Kata Teks
      const searchQuery = document.getElementById('input-search')?.value.toLowerCase().trim() || '';
      const searchWords = searchQuery.split(/\s+/).filter(word => word.length > 0);

      let filteredItems = clipboardItems.filter(item => {
        const itemTextLower = item.text.toLowerCase();
        return searchWords.every(word => itemTextLower.includes(word));
      });

      // ---- [BARU] 2. Filter Berdasarkan Status Pinned Dropdown ----
      const pinFilterValue = document.getElementById('filter-pin')?.value || 'all';
      if (pinFilterValue === 'pinned') {
        filteredItems = filteredItems.filter(item => item.pinned === true);
      } else if (pinFilterValue === 'unpinned') {
        filteredItems = filteredItems.filter(item => item.pinned === false);
      }
      // -------------------------------------------------------------

      if (filteredItems.length === 0) {
        clipboardList.innerHTML = '<div class="text-center py-12 bg-white rounded-2xl border border-gray-200 text-gray-400 text-sm">Tidak ada history yang cocok.</div>';
        return;
      }

      // 3. Urutkan MURNI berdasarkan tanggal terbaru
      const sortedItems = [...filteredItems].sort((a, b) => {
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      // 4. Render ke HTML
      sortedItems.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = `p-4 rounded-2xl shadow-sm border transition-all flex flex-col justify-between ${
          item.pinned ? 'bg-amber-50/60 border-amber-300 ring-1 ring-amber-300' : 'bg-white border-gray-200'
        }`;

        const dateFormatted = new Date(item.createdAt).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

        itemEl.innerHTML = `
          <div class="whitespace-pre-wrap break-words text-[15px] leading-relaxed text-gray-800 pb-3 select-text">${escapeHTML(item.text)}</div>
          
          <div class="border-t pt-3 border-gray-100 flex flex-col gap-2.5">
            <div class="text-[11px] font-semibold text-gray-400 flex items-center gap-1 px-0.5">
              <span>📅</span> <span>${dateFormatted}</span>
            </div>
            
            <div class="grid grid-cols-3 gap-2 text-xs font-bold text-center">
              <button onclick="copyText('${escapeJS(item.text)}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1">
                📋 Copy
              </button>
              <button onclick="togglePin('${item.id}')" class="py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1 ${
                item.pinned ? 'bg-amber-200 text-amber-900 hover:bg-amber-300' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'
              }">
                📌 ${item.pinned ? 'Unpin' : 'Pin'}
              </button>
              <button onclick="deleteItem('${item.id}')" class="bg-red-50 hover:bg-red-100 text-red-700 py-2.5 px-2 rounded-xl transition active:scale-95 flex items-center justify-center gap-1">
                ❌ Hapus
              </button>
            </div>
          </div>
        `;
        clipboardList.appendChild(itemEl);
      });
    }

    // Aksi: Simpan Item Baru
    btnSave.addEventListener('click', () => {
      const text = inputText.value.trim();
      if (!text) return;

      saveClipboard(text);
      
      inputText.value = '';
      autoResizeTextArea();
      inputText.blur();
    });

    // Aksi: Toggle Pin/Unpin via PATCH
    async function togglePin(id) {
      const currentItem = clipboardItems.find(item => item.id === id);
      if (!currentItem) return;
      
      const targetPinState = !currentItem.pinned;

      toggleLoading(true);
      try {
        const res = await fetch(`/api/clipboard?id=${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pinned: targetPinState })
        });
        
        if (res.ok) {
          currentItem.pinned = targetPinState;
          renderList();
          showNotification(targetPinState ? '📌 Item di-pin!' : '🔓 Item di-unpin!');
        } else {
          showNotification('❌ Gagal mengubah status pin.');
        }
      } catch (err) {
        console.error(err);
      } finally {
        toggleLoading(false);
      }
    }

    // Aksi: Hapus per Item via DELETE
    async function deleteItem(id) {
      if (confirm('Hapus item ini secara permanen dari cloud?')) {
        toggleLoading(true);
        try {
          const res = await fetch(`/api/clipboard?id=${id}`, {
            method: 'DELETE'
          });
          
          if (res.ok) {
            clipboardItems = clipboardItems.filter(item => item.id !== id);
            renderList();
            showNotification('🗑️ Item berhasil dihapus!');
          } else {
            showNotification('❌ Gagal menghapus item.');
          }
        } catch (err) {
          console.error(err);
        } finally {
          toggleLoading(false);
        }
      }
    }

    // Aksi: Bersihkan semua yang tidak di-pin via DELETE massal terfilter
    btnClearAll.addEventListener('click', async () => {
      if (confirm('Hapus semua item yang tidak di-pin dari cloud?')) {
        toggleLoading(true);
        try {
          const res = await fetch('/api/clipboard?clearUnpinned=true', {
            method: 'DELETE'
          });
          
          if (res.ok) {
            clipboardItems = clipboardItems.filter(item => item.pinned === true);
            renderList();
            showNotification('🗑️ Semua item unpinned dibersihkan!');
          } else {
            showNotification('❌ Gagal membersihkan item.');
          }
        } catch (err) {
          console.error(err);
        } finally {
          toggleLoading(false);
        }
      }
    });

    // Aksi: Refresh Manual
    btnRefresh.addEventListener('click', fetchClipboard);

    // Fungsi Pembantu: Salin teks ke clipboard browser asli
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showNotification('📋 Teks disalin!');
      }).catch(err => alert('Gagal menyalin teks: ' + err));
    }

    // Notifikasi Toast
    function showNotification(message) {
      toast.innerHTML = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // Utilities untuk keamanan XSS
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
    function escapeJS(str) {
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
    }

    // Load data dan pasang listener setelah seluruh komponen halaman selesai dimuat
    window.addEventListener('DOMContentLoaded', () => {
      // 1. Ambil data pertama kali dari cloud
      fetchClipboard();
      
      // 2. Pasang event listener pencarian kata teks
      const searchInput = document.getElementById('input-search');
      if (searchInput) {
        searchInput.addEventListener('input', renderList);
      }

      // 3. Pasang event listener dropdown status pin
      const pinFilter = document.getElementById('filter-pin');
      if (pinFilter) {
        pinFilter.addEventListener('change', renderList);
      }
    });
  </script>
</body>
</html>
