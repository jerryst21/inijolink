<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Kerja CV. KSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #121212; color: #e0e0e0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="bg-yellow-500 w-16 h-16 mx-auto mb-4 rounded-lg flex items-center justify-center font-bold text-black text-2xl shadow-lg shadow-yellow-500/20">
                X.O
            </div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-tighter text-white">HALAMAN KERJA CV. KSB</h1>
        </div>

        <!-- Container Link -->
        <div id="link-container" class="space-y-8">
            <!-- Data akan dimuat di sini oleh JavaScript -->
            <div class="text-center py-10 animate-pulse text-gray-500">Memuat akses kerja...</div>
        </div>

        <!-- Footer -->
        <div class="mt-12 pt-8 border-t border-gray-800 text-center text-xs text-gray-600">
            &copy; 2026 INIJO Link - Management System
        </div>
    </div>

    <script>
        async function fetchLinks() {
            try {
                const response = await fetch('/api/base');
                const categories = await response.json();
                
                const container = document.getElementById('link-container');
                container.innerHTML = '';

                categories.forEach(cat => {
                    let sectionHtml = `
                        <section>
                            <h2 class="text-xs font-bold text-yellow-500 mb-4 tracking-widest uppercase border-l-4 border-yellow-500 pl-3">${cat.category}</h2>
                            <div class="grid gap-2">
                    `;

                    cat.links.forEach(link => {
                        sectionHtml += `
                            <a href="${link.url}" target="_blank" class="glass-card flex items-center p-4 rounded-xl hover:bg-white/10 transition-all active:scale-[0.98]">
                                <div class="w-8 text-xs text-gray-500 font-bold">${link.no}</div>
                                <div class="flex-shrink-0 w-8 h-8 bg-gray-800 rounded flex items-center justify-center mr-4 text-sm">
                                    ${link.icon}
                                </div>
                                <div class="flex-grow font-bold text-sm tracking-tight text-gray-200">
                                    ${link.title}
                                </div>
                                <div class="flex items-center space-x-3">
                                    ${link.info ? `<span class="text-[10px] bg-gray-700 px-2 py-1 rounded text-gray-300">${link.info}</span>` : ''}
                                    ${link.status ? `<span class="text-xs">${link.status}</span>` : ''}
                                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </div>
                            </a>
                        `;
                    });

                    sectionHtml += `</div></section>`;
                    container.innerHTML += sectionHtml;
                });
            } catch (error) {
                document.getElementById('link-container').innerHTML = `<div class="text-red-500 text-center">Gagal memuat data. Periksa koneksi atau file API.</div>`;
            }
        }

        fetchLinks();
    </script>
</body>
</html>
