<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Kerja CV. KSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ikon Pack: Flaticon & FontAwesome 6 -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/all/all.min.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #000000;
            --card-surface: #121214;
            --accent-yellow: #FACC15;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
        }

        .work-card {
            background-color: var(--card-surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease-out;
        }

        .work-card:active {
            transform: scale(0.97);
            background-color: #1a1a1c;
        }

        .pill-link {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1d1d6;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        .pill-link:hover {
            background: var(--accent-yellow);
            color: #000000;
            border-color: var(--accent-yellow);
        }

        /* PERBAIKAN: Nomor Urut Lebih Terang */
        .num-badge {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            color: #71717a; /* Diubah dari #3a3a3c ke warna abu yang lebih terang */
            font-size: 20px;
            letter-spacing: -0.05em;
        }

        .category-header {
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #FFFFFF;
            font-size: 14px;
        }

        /* Fix alignment untuk semua jenis ikon */
        .icon-container i {
            display: flex !important;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-6 md:p-12 pb-24">

    <div class="max-w-xl mx-auto">
        <header class="mb-12 flex items-center gap-4">
            <div class="bg-yellow-400 h-14 w-14 rounded-2xl flex items-center justify-center shadow-[0_8px_30px_rgb(250,204,21,0.3)] rotate-3">
                <span class="font-extrabold text-black text-2xl">XO</span>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Dashboard Kerja</h1>
                <p class="text-yellow-400 font-bold text-xs uppercase tracking-widest opacity-80">CV. Kawan Sejahtera Bersama</p>
            </div>
        </header>

        <div id="link-container" class="space-y-12">
            <div class="py-20 text-center">
                <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-yellow-400 border-r-transparent"></div>
            </div>
        </div>

        <footer class="mt-20 pt-8 border-t border-white/10 text-center">
            <p class="text-[11px] font-bold text-gray-600 tracking-widest uppercase">© 2026 INIJO • Management System</p>
        </footer>
    </div>

    <script>
        async function fetchLinks() {
            try {
                const response = await fetch('/api/base');
                const categories = await response.json();
                const container = document.getElementById('link-container');
                container.innerHTML = '';

                let globalCounter = 1;

                categories.forEach(cat => {
                    let sectionHtml = `
                        <section>
                            <div class="flex items-center gap-4 mb-6">
                                <h2 class="category-header uppercase">${cat.category}</h2>
                                <div class="h-[2px] flex-grow bg-gradient-to-r from-yellow-400/50 to-transparent"></div>
                            </div>
                            <div class="grid gap-4">
                    `;

                    cat.links.forEach(link => {
                        // Logika deteksi ikon: Flaticon (fi-), FontAwesome (fa-), atau Emoji/Text
                        let iconDisplay = '';
                        if (link.icon.includes('fi-') || link.icon.includes('fa-')) {
                            iconDisplay = `<i class="${link.icon} text-xl" style="color: ${link.iconColor || '#FACC15'}"></i>`;
                        } else {
                            iconDisplay = `<span class="text-xl font-black text-yellow-400">${link.icon}</span>`;
                        }

                        let subLinksHtml = '';
                        if (link.subLinks && link.subLinks.length > 0) {
                            subLinksHtml = `<div class="flex flex-wrap gap-3 mt-5 pt-4 border-t border-white/[0.05]">`;
                            link.subLinks.forEach(sub => {
                                subLinksHtml += `
                                    <a href="${sub.url}" class="pill-link px-5 py-2.5 rounded-xl flex items-center gap-2">
                                        <i class="fa-solid fa-folder-open text-[10px]"></i> ${sub.label}
                                    </a>`;
                            });
                            subLinksHtml += `</div>`;
                        }

                        sectionHtml += `
                            <div class="work-card rounded-[28px] p-5 shadow-xl">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center flex-grow gap-4">
                                        <div class="num-badge w-10">
                                            ${String(globalCounter++).padStart(2, '0')}
                                        </div>
                                        
                                        <a href="${link.url}" target="_blank" class="icon-container flex-shrink-0 w-14 h-14 bg-white/[0.03] rounded-[20px] flex items-center justify-center border border-white/10">
                                            ${iconDisplay}
                                        </a>
                                        
                                        <a href="${link.url}" target="_blank" class="flex-grow">
                                            <h3 class="text-[16px] font-extrabold text-white leading-tight uppercase tracking-tight">${link.title}</h3>
                                            ${link.info ? `<p class="text-[12px] font-medium text-gray-500 mt-1">${link.info}</p>` : ''}
                                        </a>
                                    </div>

                                    <div class="flex items-center gap-3">
                                        ${link.status ? `<span class="text-lg">${link.status}</span>` : ''}
                                        <div class="text-gray-700">
                                            <i class="fa-solid fa-chevron-right text-sm"></i>
                                        </div>
                                    </div>
                                </div>
                                ${subLinksHtml}
                            </div>
                        `;
                    });

                    sectionHtml += `</div></section>`;
                    container.innerHTML += sectionHtml;
                });
            } catch (error) {
                container.innerHTML = `<div class="text-center font-bold text-red-500">GAGAL MEMUAT DATA</div>`;
            }
        }
        fetchLinks();
    </script>
</body>
</html>
